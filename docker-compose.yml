services:
  postgres:
    image: postgres:16-alpine
    container_name: cafe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafe_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cafe_cloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cafe} -d ${POSTGRES_DB:-cafe_cloud}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cafe-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cafe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cafe_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: cafe-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-cafe}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cafe_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-cafe_cloud}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: |
        echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  orders-service:
    build:
      context: .
      dockerfile: orders-service/Dockerfile
    container_name: cafe-orders-service
    environment:
      SERVICE_NAME: orders-service
      ENVIRONMENT: local
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_KEY: ${API_KEY:-}
      POSTGRES_USER: ${POSTGRES_USER:-cafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafe_secret}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cafe_cloud}
      RABBITMQ_USER: ${RABBITMQ_USER:-cafe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-cafe_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  processor-service:
    build:
      context: .
      dockerfile: processor-service/Dockerfile
    container_name: cafe-processor-service
    environment:
      SERVICE_NAME: processor-service
      ENVIRONMENT: local
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_USER: ${POSTGRES_USER:-cafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafe_secret}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cafe_cloud}
      RABBITMQ_USER: ${RABBITMQ_USER:-cafe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-cafe_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifier-service:
    build:
      context: .
      dockerfile: notifier-service/Dockerfile
    container_name: cafe-notifier-service
    environment:
      SERVICE_NAME: notifier-service
      ENVIRONMENT: local
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_KEY: ${API_KEY:-}
      RABBITMQ_USER: ${RABBITMQ_USER:-cafe}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-cafe_secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      MONGO_USER: ${MONGO_USER:-cafe}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-cafe_secret}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-cafe_cloud}
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  cleanup-job:
    build:
      context: .
      dockerfile: cleanup-job/Dockerfile
    container_name: cafe-cleanup-job
    environment:
      SERVICE_NAME: cleanup-job
      ENVIRONMENT: local
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONGO_USER: ${MONGO_USER:-cafe}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-cafe_secret}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-cafe_cloud}
    ports:
      - "8003:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  mongodb_data:
